<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Regalo para Cande</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffd1dc, #ff9aa2);
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      text-align: center;
      width: 320px;
      position: relative;
      overflow: hidden;
    }

    h2 { margin: 0; }
    p { color: #666; }

    .buttons {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 30px;
      position: relative;
    }

    button {
      padding: 6px 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    .yes {
      background: #ff6f91;
      color: white;
    }

    .no {
      background: white;
      border: 1px solid #ccc;
      position: relative;
    }

    .bouquet {
      margin-top: 20px;
      display: none;
      animation: appear 1.2s ease forwards;
    }

    svg {
      margin-top: 10px;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15));
    }

    @keyframes appear {
      from { opacity: 0; transform: scale(0.8) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

  </style>
</head>
<body>
  <div class="card">
    <div id="question">
      <h2>Daniel te tiene un regalo, Cande 💝</h2>
      <p>¿Deseas abrirlo?</p>

      <div class="buttons">
        <button class="yes" onclick="openGift()">Sí ✨</button>
        <button class="no" id="noBtn">No 😜</button>
      </div>
    </div>

    <div class="bouquet" id="bouquet">
      <h2>Para ti 🌷</h2>

      <!-- todo el resto del código sigue igual -->

  </div>

  <script>
    const noBtn = document.getElementById("noBtn");

    document.addEventListener("mousemove", (e) => {
      const rect = noBtn.getBoundingClientRect();
      const btnX = rect.left + rect.width / 2;
      const btnY = rect.top + rect.height / 2;

      const distX = e.clientX - btnX;
      const distY = e.clientY - btnY;
      const distance = Math.sqrt(distX * distX + distY * distY);

      if (distance < 120) {
        const moveX = -distX * 0.6;
        const moveY = -distY * 0.6;

        noBtn.style.transform = `translate(${moveX}px, ${moveY}px)`;
      }
    });

    function openGift() {
      document.getElementById("question").style.display = "none";
      document.getElementById("bouquet").style.display = "block";
    }
  </script>

  <audio autoplay loop>
    <source src="WhatsApp Audio 2026-02-14 at 7.18.23 PM.mpeg" type="audio/mpeg">
  </audio>

</body>
</html>
